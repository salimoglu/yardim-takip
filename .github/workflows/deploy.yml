name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-ghpages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .
          # force_orphan: her seferinde temiz commit — commit_refs / non-ff hatalarını önler
          force_orphan: true
          enable_jekyll: false
          exclude_assets: '.github,.gitignore,.deploy-watch.ps1,node_modules,.git'
          commit_message: 'deploy: ${{ github.sha }}'
